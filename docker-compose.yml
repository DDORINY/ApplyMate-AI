services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-applymate}
      POSTGRES_USER: ${POSTGRES_USER:-applymate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-applymate} -d $${POSTGRES_DB:-applymate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://applymate:change_me@postgres:5432/applymate}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/oauth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/api/v1/auth/oauth/github/callback}
      OAUTH_FRONTEND_CALLBACK_URL: ${OAUTH_FRONTEND_CALLBACK_URL:-http://localhost:3000/auth/callback}
      OAUTH_ALLOWED_REDIRECT_PATHS: ${OAUTH_ALLOWED_REDIRECT_PATHS:-/me,/profile,/settings/accounts}
      OAUTH_STATE_EXPIRE_SECONDS: ${OAUTH_STATE_EXPIRE_SECONDS:-300}
      OAUTH_TICKET_EXPIRE_SECONDS: ${OAUTH_TICKET_EXPIRE_SECONDS:-60}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-development}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ApplyMate AI}
      FRONTEND_EMAIL_VERIFY_URL: ${FRONTEND_EMAIL_VERIFY_URL:-http://localhost:3000/verify-email}
      FRONTEND_PASSWORD_RESET_URL: ${FRONTEND_PASSWORD_RESET_URL:-http://localhost:3000/reset-password}
      EMAIL_VERIFICATION_EXPIRE_MINUTES: ${EMAIL_VERIFICATION_EXPIRE_MINUTES:-30}
      PASSWORD_RESET_EXPIRE_MINUTES: ${PASSWORD_RESET_EXPIRE_MINUTES:-30}
      EMAIL_RESEND_COOLDOWN_SECONDS: ${EMAIL_RESEND_COOLDOWN_SECONDS:-60}
      LOGIN_MAX_FAILED_ATTEMPTS: ${LOGIN_MAX_FAILED_ATTEMPTS:-5}
      LOGIN_LOCKOUT_SECONDS: ${LOGIN_LOCKOUT_SECONDS:-900}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-60}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      AI_ANALYSIS_MAX_INPUT_CHARS: ${AI_ANALYSIS_MAX_INPUT_CHARS:-30000}
      AI_ANALYSIS_PROMPT_VERSION: ${AI_ANALYSIS_PROMPT_VERSION:-v1}
      AI_ANALYSIS_SCHEMA_VERSION: ${AI_ANALYSIS_SCHEMA_VERSION:-v1}
      AI_STORE_RAW_RESPONSE: ${AI_STORE_RAW_RESPONSE:-false}
      AI_DAILY_ANALYSIS_LIMIT: ${AI_DAILY_ANALYSIS_LIMIT:-20}
      AI_ANALYSIS_COOLDOWN_SECONDS: ${AI_ANALYSIS_COOLDOWN_SECONDS:-30}
      RESUME_STORAGE_DIR: ${RESUME_STORAGE_DIR:-storage/resumes}
      RESUME_MAX_FILE_SIZE_BYTES: ${RESUME_MAX_FILE_SIZE_BYTES:-5242880}
      RESUME_ALLOWED_EXTENSIONS: ${RESUME_ALLOWED_EXTENSIONS:-.pdf,.docx}
      RESUME_ALLOWED_CONTENT_TYPES: ${RESUME_ALLOWED_CONTENT_TYPES:-application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
