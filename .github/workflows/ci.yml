name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET_KEY: test-access-secret
      JWT_REFRESH_SECRET_KEY: test-refresh-secret
      AI_PROVIDER: mock
      EMAIL_PROVIDER: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - run: python -m ruff check app tests
      - run: python -m pytest -p no:cacheprovider
      - run: python -m alembic heads

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.e2e.example config --quiet
      - run: |
          ! grep -R -E "GOCSPX-|smtp\.gmail|JWT_SECRET_KEY=.*[A-Za-z0-9_-]{20}|JWT_REFRESH_SECRET_KEY=.*[A-Za-z0-9_-]{20}|SMTP_PASSWORD=.*\S" \
            --exclude=".env" --exclude=".env.*" --exclude-dir="node_modules" --exclude-dir=".next" .
